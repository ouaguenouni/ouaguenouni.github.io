<div id="liveplot" style="width:100%; height:420px;"></div>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script>
    const x = [], y = [];
    for (let i = 0; i <= 80; i++) { const t = i / 8; x.push(t); y.push(Math.exp(-t / 4) * Math.cos(2 * t)); }
    Plotly.newPlot('liveplot',
        [{ x: x, y: y, mode: 'lines', line: { color: '#1a73e8', width: 3 } }],
        {
            margin: { t: 10, r: 10, b: 36, l: 40 },
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            xaxis: { title: 't' }, yaxis: { title: 'damped cosine' },
            font: { size: 14 }
        },
        { responsive: true, displayModeBar: false }
    );
</script>
